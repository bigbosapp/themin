<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - Lite Cloud Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="lockScreen" class="lock-screen">
        <div class="lock-box">
            <span class="material-symbols-outlined lock-icon">lock</span>
            <h2 id="lockTitle">Masukkan PIN Akses</h2>
            <p id="lockSub" class="text-muted">Aplikasi dikunci demi kerahasiaan data</p>
            
            <div class="pin-row">
                <input type="password" id="pinInput" maxlength="6" placeholder="•••••" autofocus>
                <button onclick="processPin()" class="btn-primary">Buka</button>
            </div>
            
            <button onclick="resetDatabase()" class="btn-reset-db">Lupa PIN? (Reset Total Galeri)</button>
        </div>
    </div>

    <div id="workspace" class="workspace" style="display: none;">
        <nav class="top-bar">
            <div class="logo">
                <span class="material-symbols-outlined" style="color: #1a73e8; font-size: 30px;">cloud_done</span>
                <span>Drive Lite</span>
            </div>
            
            <div class="action-row">
                <button class="btn-secondary" onclick="createFolder()">
                    <span class="material-symbols-outlined">create_new_folder</span> Folder Baru
                </button>
                <button class="btn-primary" onclick="document.getElementById('fileUploader').click()">
                    <span class="material-symbols-outlined">cloud_upload</span> Upload File
                </button>
                <input type="file" id="fileUploader" multiple accept="image/*,video/*" hidden>

                <div class="divider"></div>
                <button class="btn-icon" onclick="exportDatabaseJSON()" title="Download Backup Database">
                    <span class="material-symbols-outlined">download_for_offline</span>
                </button>
                <button class="btn-icon" onclick="importDatabaseJSON()" title="Restore Database dari File">
                    <span class="material-symbols-outlined">settings_backup_restore</span>
                </button>
                <button class="btn-icon btn-danger-text" onclick="lockApp()" title="Kunci Aplikasi">
                    <span class="material-symbols-outlined">lock</span>
                </button>
            </div>
        </nav>

        <main class="container">
            <div class="path-bar">
                <span class="path-link" onclick="openFolder('root', '')">Beranda</span>
                <span id="activePathName"></span>
            </div>

            <div id="gridArea" class="grid-area"></div>
        </main>
    </div>

    <div id="mediaViewer" class="viewer-modal">
        <span class="material-symbols-outlined viewer-close" onclick="closeViewer()">close</span>
        
        <div class="viewer-controls">
            <button class="control-btn" onclick="zoomMedia(0.1)" title="Perbesar (Zoom In)">
                <span class="material-symbols-outlined">zoom_in</span>
            </button>
            <button class="control-btn" onclick="zoomMedia(-0.1)" title="Perkecil (Zoom Out)">
                <span class="material-symbols-outlined">zoom_out</span>
            </button>
            <button class="control-btn" onclick="resetZoom()" title="Kembalikan Ukuran">
                <span class="material-symbols-outlined">restart_alt</span>
            </button>
            <div class="control-divider" id="speakerDivider" style="display: none;"></div>
            <button id="viewerSpeakerBtn" class="control-btn speaker-btn" onclick="toggleViewerMute()" title="Aktifkan Suara" style="display: none;">
                <span class="material-symbols-outlined" id="speakerIcon">volume_off</span>
            </button>
        </div>

        <div id="viewerContent" class="viewer-body"></div>
    </div>

    <input type="file" id="dbImporter" accept=".json" hidden>

    <div class="toast" id="toast">Berhasil!</div>

    <script src="script.js"></script>
</body>
</html>
